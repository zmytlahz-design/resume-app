server {
    # ① 监听容器内 80 端口
    listen 80;

    # ② 静态文件根目录：Vue 打包产物放这里
    root /usr/share/nginx/html;

    # ③ 所有非 /api 开头的请求，先找真实文件
    #    找不到就返回 index.html（Vue Router history 模式必须这样配）
    #    否则刷新页面会出现 404
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ④ /api 开头的请求反向代理到后端服务
    #    backend 是 docker-compose.yml 里的服务名，Docker 内置 DNS 会解析它
    #    这样浏览器只与 nginx（同一域名）通信，完全规避跨域问题
    location /api {
        proxy_pass http://backend:8011;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # ⭐ SSE 关键：必须用 HTTP/1.1，并清空 Connection
        #    默认 HTTP/1.0 不支持 chunked encoding，整个响应会被缓存
        proxy_http_version 1.1;
        proxy_set_header Connection '';

        # 关默缓冲和 关gzip压缩（压缩会把流式整体打包后发出）
        proxy_buffering off;
        proxy_cache off;
        gzip off;
        # ⭐ 禁用 Nagle 算法：TCP 默认会把小包合并到 ~1460 字节再发
        #    SSE 事件很小（100-200 字节），不加这个会被延迟合并成一批
        tcp_nodelay on;

        # SSE 连接可能持续几分钟，超时调长
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
